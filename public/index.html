<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pattern Image Preview</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="page">
      <h1>Pattern URL Image Preview</h1>
      <p>
        Choices: comma-separated tokens, ranges supported with <code>a..b</code>
        (example: <code>1..3,a,b</code>).
      </p>

      <form id="generatorForm">
        <label>
          캐릭터
          <input
            id="characterInput"
            type="text"
            required
            placeholder="1..4,hero,npc"
          />
        </label>
        <label>
          의상
          <input
            id="clothesInput"
            type="text"
            required
            placeholder="0..2,casual"
          />
        </label>
        <label>
          상황
          <input
            id="typeInput"
            type="text"
            required
            placeholder="0..5"
          />
        </label>
        <label>
          Referrer
          <select id="referrerSelect">
            <option value="https://babechat.ai/">babechat.ai</option>
            <option value="https://genit.ai/">genit.ai</option>
          </select>
        </label>
        <label class="full">
          URL template
          <input
            id="templateInput"
            type="text"
            required
            placeholder="https://cdn.example.com/캐릭터_의상_상황.png"
          />
        </label>

        <div class="row">
          <button type="submit">Generate Main List</button>
          <button type="button" id="backButton" class="secondary" hidden>
            Back To Main List
          </button>
        </div>
      </form>

      <div id="status"></div>
      <div id="modeLabel"></div>
      <section id="list" aria-live="polite"></section>
    </main>
    <script src="/static/script.js" defer></script>
  </body>
</html>
